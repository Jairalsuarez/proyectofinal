<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>proyectofinal</title>
    <link rel="stylesheet" href="./css/style.css">
    <script type="module" src="./js/stays.js"></script>
  </head>
  <body class="font-sans">

    <header class="py-5 px-4 md:px-20 relative">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
        
        <div class="flex items-center cursor-pointer">
        <a href="./index.html">
          <img src="./src/images/icons/logo-f7862584.svg" alt="Windbnb Logo" class="h-6">
        </a>  
        </div>

        <div id="botonAbrirModal" class="cursor-pointer flex items-center border rounded-2xl shadow-sm overflow-hidden h-12 w-full max-w-[300px] hover:shadow-md transition-shadow self-center md:self-auto">
          <div class="flex-1 border-r h-full flex items-center px-4">
            <button id="navUbicacion" class="cursor-pointer text-xs lg:text-sm text-gray-400 font-semibold focus:outline-none bg-transparent w-full text-left truncate">
              Add location
            </button>
          </div>
          
          <div class="flex-1 border-r h-full flex items-center px-4 cursor-pointer">
            <button id="navHuespedes" class="cursor-pointer text-xs lg:text-sm text-gray-400 focus:outline-none bg-transparent w-full text-left truncate">
              Add guests
            </button>
          </div>
          
          <div class="px-4 flex items-center justify-center h-full">
            <img class="w-4 h-4" src="./src/images/icons/search.svg" alt="Search" style="filter: invert(38%) sepia(58%) saturate(3033%) hue-rotate(337deg) brightness(95%) contrast(90%);">
          </div>
        </div>

      </div>

      <div id="modalVentana" class="fixed inset-0 z-50 hidden bg-black/40 transition-opacity duration-300 opacity-0">
        <div id="contenidoModal" class="bg-white w-full absolute top-0 left-0 transform -translate-y-full transition-transform duration-300 ease-in-out p-6 md:px-20 md:py-10 min-h-[75vh] md:min-h-[50vh] shadow-xl">
          
          <div class="flex justify-between items-center mb-6 md:hidden">
            <p class="font-bold text-xs text-gray-800">Edit your search</p>
            <span id="botonCerrarModal" class="cursor-pointer text-xl font-bold text-gray-800">×</span>
          </div>

          <div class="flex flex-col md:flex-row border rounded-2xl shadow-sm overflow-hidden mb-8 md:max-w-6xl md:mx-auto">
            <div class="flex-1 border-b md:border-b-0 md:border-r p-3 px-6 relative cursor-pointer hover:bg-gray-50 focus-within:bg-gray-50">
              <label for="entradaUbicacion" class="block text-[9px] font-extrabold uppercase text-gray-800">Location</label>
              <input type="text" id="entradaUbicacion" placeholder="Add location" class="w-full focus:outline-none bg-transparent text-sm text-gray-800 placeholder-gray-400 mt-1">
            </div>
            
            <div class="flex-1 p-3 px-6 border-b md:border-b-0 cursor-pointer hover:bg-gray-50">
              <label for="entradaHuespedes" class="block text-[9px] font-extrabold uppercase text-gray-800">Guests</label>
              <input type="text" id="entradaHuespedes" placeholder="Add guests" readonly class="w-full focus:outline-none bg-transparent text-sm text-gray-800 placeholder-gray-400 mt-1 cursor-pointer">
            </div>
            
            <div class="hidden md:flex items-center justify-center px-6">
              <button id="botonBusquedaEscritorio" class="bg-[#EB5757] hover:bg-red-600 text-white px-6 py-3 cursor-pointer rounded-2xl flex items-center gap-2 font-bold transition-colors">
                <img class="w-4 h-4 filter invert" src="./src/images/icons/search.svg" alt="Search"> Search
              </button>
            </div>
          </div>

          <div class="flex flex-col md:flex-row md:max-w-6xl md:mx-auto gap-8 mt-4">
            <div class="flex-1 pl-2 md:pl-6">
              <ul id="listaUbicaciones" class="flex flex-col gap-6 text-gray-600 text-sm">
              </ul>
            </div>

            <div class="flex-1 pl-2 md:pl-6 flex flex-col gap-8">
              <div>
                <p class="font-bold text-sm text-gray-800">Adults</p>
                <p class="text-sm text-gray-400 mb-3">Ages 13 or above</p>
                <div class="flex items-center gap-4">
                  <button id="botonBajarAdultos" class="w-8 h-8 border border-gray-400 rounded flex justify-center items-center text-gray-500 hover:text-gray-800 hover:border-gray-800 transition-colors cursor-pointer">-</button>
                  <span id="valorAdultosTexto" class="w-4 text-center font-bold text-gray-800">0</span>
                  <button id="botonSubirAdultos" class="w-8 h-8 border border-gray-400 rounded flex justify-center items-center text-gray-500 hover:text-gray-800 hover:border-gray-800 transition-colors cursor-pointer">+</button>
                </div>
              </div>
              
              <div>
                <p class="font-bold text-sm text-gray-800">Children</p>
                <p class="text-sm text-gray-400 mb-3">Ages 2-12</p>
                <div class="flex items-center gap-4">
                  <button id="botonBajarNinos" class="w-8 h-8 border border-gray-400 rounded flex justify-center items-center text-gray-500 hover:text-gray-800 hover:border-gray-800 transition-colors cursor-pointer">-</button>
                  <span id="valorNinosTexto" class="w-4 text-center font-bold text-gray-800">0</span>
                  <button id="botonSubirNinos" class="w-8 h-8 border border-gray-400 rounded flex justify-center items-center text-gray-500 hover:text-gray-800 hover:border-gray-800 transition-colors cursor-pointer">+</button>
                </div>
              </div>
            </div>
          </div>
          
          <div class="absolute bottom-6 left-0 w-full flex justify-center md:hidden">
            <button id="botonBusquedaMovil" class="bg-[#EB5757] hover:bg-red-600 text-white px-12 py-3 rounded-2xl flex items-center gap-2 font-bold shadow-md shadow-red-500/30 transition-colors">
              <img class="w-4 h-4 filter invert" src="./src/images/icons/search.svg" alt="Search"> Search
            </button>
          </div>

        </div>
      </div>

    </header>

    <div class="px-4 md:px-20 py-8">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">Stays in Finland</h1>
        <p id="contadorEstancias" class="text-gray-600 text-sm">12+ stays</p>
      </div>

      <main>
        <div id="contenedorEstancias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12">
        </div>
      </main>
    </div>

  </body>
</html>
